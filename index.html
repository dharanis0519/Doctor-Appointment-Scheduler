<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patients</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img 
              src="https://www.capminds.com/wp-content/uploads/2025/03/Capminds-logo-with-text-2-1.svg" 
              alt="CAPMINDS Logo"
              class="logo-img"
            >
          </div>
          
      <button id="openModal" class="book-btn">+ Book Appointment</button>

    </header>
    
    <div class="layout">

      <div class="mobile-menu">
        <button onclick="goPage('index.html')">
          <i data-lucide="calendar"></i>
          Calendar
        </button>
      
        <button onclick="goPage('patient.html')">
          <i data-lucide="layout-dashboard"></i>
          Dashboard
        </button>
      </div>
    
      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">

        <div class="toggle-btn" onclick="toggleSidebar()">
          <i id="toggleIcon" data-lucide="chevrons-left"></i>
        </div>
      
        <div class="menu active" onclick="goPage('index.html')">
          <i data-lucide="calendar"></i>
          <span class="text">Calendar</span>
        </div>
        
        <div class="menu" onclick="goPage('patient.html')">
          <i data-lucide="layout-dashboard"></i>
          <span class="text">Dashboard</span>
        </div>
      
      </aside>
    
      <!-- MAIN CONTENT -->
      <main class="content">
    
        <!-- TOP BAR -->
        <div class="calendar-top">

          <div class="left"></div>
        
          <div class="center">All Appointments</div>
        
          <div class="right">
            <button onclick="prevMonth()">‹</button>
            <span id="monthYear"></span>
            <button onclick="nextMonth()">›</button>
          </div>
        
        </div>
    
        <!-- WEEK HEADER -->
         <div class="calendar-scroll">
        <div class="week-header">
          <div data-short="SUN">SUNDAY</div>
          <div data-short="MON">MONDAY</div>
          <div data-short="TUE">TUESDAY</div>
          <div data-short="WED">WEDNESDAY</div>
          <div data-short="THU">THURSDAY</div>
          <div data-short="FRI">FRIDAY</div>
          <div data-short="SAT">SATURDAY</div>
        </div>
        

    
        <!-- CALENDAR -->
        <div id="calendar" class="calendar"></div>
         </div>
      </main>
    
    </div>
    
    <!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <div class="modal-header">
      <h3>Schedule Appointment</h3>
      <span id="closeModal" style="cursor:pointer;">✖</span>
    </div>

    <div class="form-grid">

      <div class="field">
        <i data-lucide="user"></i>
        <input id="patient" placeholder="Patient Name">
      </div>
      
      <div class="field">
        <i data-lucide="stethoscope"></i>
        <select id="doctor">
          <option value="">Select Doctor</option>
        </select>
      </div>
      
      <div class="field">
        <i data-lucide="map-pin"></i>
        <input type="text" id="hospital" placeholder="Hospital" readonly>
      </div>
      
      <div class="field">
        <i data-lucide="briefcase-medical"></i>
        <input type="text" id="specialty" placeholder="Specialty" readonly>
      </div>
     
    
      
      <div class="field">
        <i data-lucide="calendar"></i>
        <input type="text" id="dateInput" placeholder="Select Date" readonly onclick="openCalendar()">
        <div id="calendarPopup" class="calendar-popup"></div>
      </div>
      
      <div class="field">
        <i data-lucide="clock"></i>
        <input type="text" id="timeInput" placeholder="Select Time" readonly onclick="toggleTime()">
        <div id="timePopup" class="time-popup"></div>
      </div>
    
    </div>
      

    <textarea id="reason" placeholder="Reason"></textarea>

    <div class="modal-actions">
      <button id="cancelBtn">Cancel</button>
      <button id="saveBtn">Save</button>
    </div>

  </div>
</div>

<div class="modal" id="detailsModal">
  <div class="modal-content">

    <div class="modal-header">
      <h3>Appointment Details</h3>
      <span onclick="closeDetails()">✖</span>
    </div>

    <div id="detailsContent"></div>

  </div>
</div>
    <script src="script.js"></script>
    </body>
